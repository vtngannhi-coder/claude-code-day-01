<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #090A14;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .font-poppins { font-family: 'Poppins', sans-serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
    .primary-bg { background-color: #DF6B33; }
    .primary-bg:hover { background-color: #c85d29; }
    .primary-text { color: #DF6B33; }
    .primary-border { border-color: #DF6B33; }
    .input-bg { background-color: #1a1b2e; }
    .input-border { border-color: #2a2b3e; }
    .input-border:focus { border-color: #DF6B33; }
    .card-bg { background-color: #0f101d; }
    .label-color { color: #9ca3af; }
    .social-btn:hover { background-color: #1a1b2e; border-color: #DF6B33; }
    .link-hover:hover { color: #DF6B33; }
    .divider-line { background-color: #2a2b3e; }
    .check-mark { accent-color: #DF6B33; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #1a1b2e inset !important;
      -webkit-text-fill-color: #e5e7eb !important;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-6">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl primary-bg mb-4">
        <i data-lucide="shield-check" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="font-poppins text-3xl font-extrabold text-white mb-1">Welcome Back</h1>
      <p class="font-inter text-sm" style="color: #6b7280;">Sign in to continue to your account</p>
    </div>

    <!-- Card -->
    <div class="card-bg rounded-2xl p-8 sm:p-10 shadow-2xl" style="border: 1px solid #1f2035;">

      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="font-inter text-sm font-medium label-color block mb-2">Email Address</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2" style="color: #4b5563;">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="w-full input-bg text-white font-inter text-sm rounded-xl py-3 pl-12 pr-4 outline-none transition-all duration-200 input-border border"
              onblur="validateEmail()"
            >
            <span id="emailError" class="font-inter text-xs mt-1 hidden" style="color: #ef4444;"></span>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label for="password" class="font-inter text-sm font-medium label-color block mb-2">Password</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2" style="color: #4b5563;">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              class="w-full input-bg text-white font-inter text-sm rounded-xl py-3 pl-12 pr-12 outline-none transition-all duration-200 input-border border"
              onblur="validatePassword()"
            >
            <span id="passwordError" class="font-inter text-xs mt-1 hidden" style="color: #ef4444;"></span>
            <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer" style="color: #4b5563;" onclick="togglePasswordVisibility()">
              <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between mb-7">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" class="w-4 h-4 rounded check-mark cursor-pointer">
            <span class="font-inter text-sm" style="color: #9ca3af;">Remember me</span>
          </label>
          <a href="#" class="font-inter text-sm font-medium primary-text link-hover transition-colors duration-200" style="text-decoration: none;">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full primary-bg text-white font-inter font-semibold text-base rounded-xl py-3 cursor-pointer transition-all duration-200 shadow-lg" style="box-shadow: 0 4px 20px rgba(223, 107, 51, 0.25);">
          Sign In
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-7">
        <div class="flex-1 h-px divider-line"></div>
        <span class="font-inter text-xs" style="color: #4b5563;">or continue with</span>
        <div class="flex-1 h-px divider-line"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-3 gap-3">

        <!-- Google -->
        <button class="social-btn flex items-center justify-center rounded-xl py-3 border cursor-pointer transition-all duration-200" style="border-color: #2a2b3e;">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>

        <!-- GitHub -->
        <button class="social-btn flex items-center justify-center rounded-xl py-3 border cursor-pointer transition-all duration-200" style="border-color: #2a2b3e;">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
        </button>

        <!-- Facebook -->
        <button class="social-btn flex items-center justify-center rounded-xl py-3 border cursor-pointer transition-all duration-200" style="border-color: #2a2b3e;">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>

      </div>

    </div>

    <!-- Sign up link -->
    <p class="font-inter text-sm text-center mt-6" style="color: #6b7280;">
      Don't have an account?
      <a href="register.html" class="font-medium primary-text link-hover transition-colors duration-200" style="text-decoration: none;">Sign up</a>
    </p>

  </div>

  <script>
    // Init Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    function togglePasswordVisibility() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Validation functions
    function validateEmail() {
      const email = document.getElementById('email');
      const error = document.getElementById('emailError');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email.value.trim()) {
        error.textContent = 'Email is required';
        error.classList.remove('hidden');
        email.style.borderColor = '#ef4444';
        return false;
      } else if (!emailRegex.test(email.value)) {
        error.textContent = 'Please enter a valid email address';
        error.classList.remove('hidden');
        email.style.borderColor = '#ef4444';
        return false;
      } else {
        error.classList.add('hidden');
        email.style.borderColor = '#2a2b3e';
        return true;
      }
    }

    function validatePassword() {
      const password = document.getElementById('password');
      const error = document.getElementById('passwordError');
      if (!password.value) {
        error.textContent = 'Password is required';
        error.classList.remove('hidden');
        password.style.borderColor = '#ef4444';
        return false;
      } else {
        error.classList.add('hidden');
        password.style.borderColor = '#2a2b3e';
        return true;
      }
    }

    // Handle form submit
    function handleLogin(e) {
      e.preventDefault();
      const emailValid = validateEmail();
      const passwordValid = validatePassword();
      if (!emailValid || !passwordValid) return;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.querySelector('input[type="checkbox"]').checked;
      console.log('Login attempt:', { email, remember });
      alert('Sign in with:\nEmail: ' + email + '\nRemember: ' + remember);
    }
  </script>

</body>
</html>
